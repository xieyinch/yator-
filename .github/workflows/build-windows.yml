name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install --package-lock=false

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build Rust binaries
        run: cargo build --release

      - name: Package exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/codex-plus-plus.exe dist/
          Copy-Item target/release/codex-plus-plus-manager.exe dist/
          Compress-Archive -Path dist/*.exe -DestinationPath dist/yator-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yator-windows-x64
          path: dist/yator-windows-x64.zip
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'codx++ 纯净版'
          tag_name: 'latest'
          body: |
            codx++ 纯净版 Windows 构建

            - 已移除所有广告、推荐内容、赞助商信息和赞赏码
            - `codex-plus-plus.exe` — 启动器
            - `codex-plus-plus-manager.exe` — 管理工具
          files: dist/yator-windows-x64.zip
          prerelease: false
          make_latest: true
